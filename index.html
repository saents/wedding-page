<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="Հարսանիքի հրավեր — Սարգիս և Լենա, Հուլիսի 26, 2026" />
  <title>Սարգիս և Լենա — Հարսանիքի հրավեր</title>

  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Armenian:wght@100;200;300;400&family=Noto+Serif+Armenian:wght@200;300;400&display=swap" rel="stylesheet" />

  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="preloader" class="preloader" aria-hidden="true">
    <div class="preloader__inner">
      <div class="preloader__rings">
        <span></span><span></span><span></span>
      </div>
      <p class="preloader__text" data-preloader-names>Սարգիս և Լենա</p>
      <div class="preloader__progress"><div class="preloader__bar"></div></div>
    </div>
  </div>

  <div class="scroll-progress" aria-hidden="true"><div class="scroll-progress__bar"></div></div>

  <header class="header" id="header">
    <nav class="nav container">
      <button class="nav__toggle" id="nav-toggle" aria-label="Բացել մենյուն" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__menu" id="nav-menu">
        <li><a href="#invitation" class="nav__link">Հրավեր</a></li>
        <li><a href="#location" class="nav__link">Տեղակայում</a></li>
        <li><a href="#program" class="nav__link">Ծրագիր</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">

    <!-- Section 1: Hero -->
    <section class="hero" id="hero">
      <div class="hero__bg">
        <img class="hero__image" data-hero-image alt="Սարգիս և Լենա" loading="eager" />
        <div class="hero__overlay"></div>
      </div>
      <div class="hero__content container" data-aos="fade-up" data-aos-duration="1200">
        <h1 class="hero__title">
          <span class="hero__name" data-bride-name>Սարգիս</span>
          <span class="hero__ampersand">և</span>
          <span class="hero__name" data-groom-name>Լենա</span>
        </h1>
        <p class="hero__date" data-wedding-date></p>
      </div>
      <a href="#invitation" class="hero__scroll" aria-label="Scroll down">
        <span class="hero__scroll-line"></span>
      </a>
    </section>

    <!-- Section 2: Invitation + Calendar -->
    <section class="invitation section section--white" id="invitation">
      <div class="container invitation__inner">
        <h2 class="invitation__title" data-aos="fade-up" data-invitation-title></h2>
        <p class="invitation__text" data-aos="fade-up" data-aos-delay="100" data-invitation-text></p>
        <div class="calendar" id="calendar" data-aos="fade-up" data-aos-delay="200" aria-label="Օրացույց"></div>
      </div>
    </section>

    <!-- Section 3: Location intro -->
    <section class="location-intro section section--white" id="location">
      <div class="container location-intro__inner">
        <div class="location-intro__photo-wrap" data-aos="fade-up">
          <img class="location-intro__photo" data-location-photo alt="Տեղակայում" loading="lazy" />
        </div>
        <h2 class="location-intro__title" data-aos="fade-up" data-aos-delay="100" data-location-title></h2>
      </div>
    </section>

    <!-- Section 4: Venues & Program -->
    <section class="venues section section--white" id="venues">
      <div class="container">
        <div class="venue-block" data-aos="fade-up">
          <h3 class="venue-block__name" data-church-name></h3>
          <p class="venue-block__desc" data-church-desc></p>
          <div class="venue-block__map" id="church-map"></div>
        </div>

        <div class="venue-block" data-aos="fade-up" data-aos-delay="100">
          <h3 class="venue-block__name" data-hall-name></h3>
          <p class="venue-block__desc" data-hall-desc></p>
          <div class="venue-block__map" id="hall-map"></div>
        </div>
      </div>
    </section>

    <section class="program section section--white" id="program">
      <div class="container">
        <h2 class="section__title section__title--thin" data-aos="fade-up" data-program-title></h2>
        <div class="schedule__list" id="schedule-list"></div>
      </div>
    </section>

    <!-- Section 5: Countdown -->
    <section class="countdown-hero section section--white" id="countdown">
      <div class="container">
        <div class="countdown-hero__visual">
          <img class="countdown-hero__image" data-countdown-image alt="" loading="lazy" />
          <div class="countdown-hero__content" data-aos="fade-up">
            <h2 class="countdown-hero__title" data-countdown-title></h2>
            <div class="countdown__grid" id="countdown-grid"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="closing section section--white" id="closing">
      <div class="container">
        <p class="closing__text" data-aos="fade-up" data-closing-text></p>
      </div>
    </section>

  </main>

  <footer class="footer" id="footer">
    <div class="container footer__inner">
      <div class="footer__names" data-footer-names>Սարգիս և Լենա</div>
      <p class="footer__date" data-footer-date></p>
      <p class="footer__credit"><span data-year></span></p>
    </div>
  </footer>

  <audio id="bg-music" loop preload="auto"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"
    onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js'"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" crossorigin="anonymous"
    onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js'"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
